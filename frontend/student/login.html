<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - AccelerateAI</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body {
      background: linear-gradient(135deg, #0F172A 0%, var(--primary) 60%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 44px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .login-logo h1 {
      font-size: 26px;
      font-weight: 800;
      color: #1F2937;
    }

    .login-logo p {
      font-size: 14px;
      color: #6B7280;
      margin-top: 4px;
    }

    .nm-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #059669, #047857);
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
      margin-bottom: 24px;
      text-decoration: none;
    }

    .nm-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(5, 150, 105, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      color: #9CA3AF;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }

    .login-form .btn {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 15px;
      margin-top: 8px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #6B7280;
    }

    .back-link a {
      color: #1E40AF;
      font-weight: 600;
    }

    .creds-hint {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 10px;
      padding: 14px;
      margin-top: 20px;
      font-size: 13px;
      color: #166534;
    }

    .creds-hint strong {
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>

<body class="theme-student">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="../assets/tn-logo.png" style="height: 60px; margin-bottom: 16px;">
        <h1>Student Portal</h1>
        <p>AccelerateAI — Slingshot Talent Login</p>
      </div>

      <div class="tab-selector"
        style="display:flex;background:#F3F4F6;border-radius:10px;padding:4px;margin-bottom:24px;">
        <button class="tab-btn active" onclick="switchTab('login',this)"
          style="flex:1;padding:10px;border:none;background:white;cursor:pointer;font-size:14px;font-weight:600;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);color:var(--primary);">🔑
          Login</button>
        <button class="tab-btn" onclick="switchTab('register',this)"
          style="flex:1;padding:10px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:600;border-radius:8px;">📝
          Register</button>
      </div>

      <!-- LOGIN TAB -->
      <div id="loginTab">
        <button class="nm-btn" onclick="nmLogin()">
          🏛️ Login with Slingshot Talent
          <span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:20px;font-size:12px;">OAuth</span>
        </button>

        <div class="divider">or login directly</div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="student1@nm.tn.gov.in">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>

        <button class="btn btn-primary btn-lg" onclick="doLogin()" style="width:100%;justify-content:center;">
          Login to Student Portal →
        </button>
      </div>

      <!-- REGISTER TAB -->
      <div id="registerTab" style="display:none;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="regName" class="form-control" placeholder="Rajesh Kumar">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-control" placeholder="name@student.tn.gov.in">
        </div>
        <div class="form-group">
          <label class="form-label">GitHub Profile URL</label>
          <input type="text" id="regGithub" class="form-control" placeholder="github.com/your-username">
        </div>
        <div class="form-group">
          <label class="form-label">Resume URL (PDF/Drive)</label>
          <input type="text" id="regResume" class="form-control" placeholder="https://drive.google.com/...">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="regPass" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:15px;"
          onclick="doRegister()">
          Register Student Account →
        </button>
      </div>

      <div class="creds-hint">
        <strong>🧪 Test Credentials</strong>
        student1@nm.tn.gov.in / student123<br>
        student2@nm.tn.gov.in / student123
      </div>

      <div class="back-link"><a href="../index.html">← Back to Home</a></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = 'transparent';
        b.style.boxShadow = 'none';
        b.style.color = '#6B7280';
      });
      btn.classList.add('active');
      btn.style.background = 'white';
      btn.style.boxShadow = '0 2px 6px rgba(0,0,0,0.1)';
      btn.style.color = 'var(--primary)';

      document.getElementById('loginTab').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerTab').style.display = tab === 'register' ? 'block' : 'none';
    }

    function nmLogin() {
      document.getElementById('email').value = 'student1@nm.tn.gov.in';
      document.getElementById('password').value = 'student123';
      showToast('Slingshot Talent OAuth simulated ✓', 'info');
      setTimeout(doLogin, 600);
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      if (!email || !pass) { showToast('Please enter email and password', 'warning'); return; }
      handleLogin(email, pass, 'student');
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const github = document.getElementById('regGithub').value.trim();
      const resume = document.getElementById('regResume').value.trim();
      const pass = document.getElementById('regPass').value;

      if (!name || !email || !pass) { showToast('Please fill all fields', 'warning'); return; }

      try {
        showLoader('Creating account...');
        await apiCall('/auth/register/student', 'POST', {
          name,
          email,
          password: pass,
          resume_url: resume,
          github_profile: github
        });
        hideLoader();
        showToast('Registration successful! Please login.', 'success');
        switchTab('login', document.querySelector('.tab-btn:nth-child(1)'));
      } catch (err) {
        hideLoader();
        showToast('Registration failed: ' + err.message, 'error');
      }
    }  </script>
</body>

</html>
